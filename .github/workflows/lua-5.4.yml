name: Lua 5.4

on:
    push:
        branches:
            - main
        paths:
            - .github/workflows/lua-5.4.yml
            - Lua54AllOpcodeCases.lua
    pull_request:
        paths:
            - .github/workflows/lua-5.4.yml
            - Lua54AllOpcodeCases.lua
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Install Lua 5.4
              uses: leafo/gh-actions-lua@v12
              with:
                  luaVersion: 5.4.8

            - name: Run Lua 5.4 opcode script
              shell: bash
              run: |
                  set -euo pipefail
                  output="$(lua Lua54AllOpcodeCases.lua)"
                  printf '%s\n' "$output"
                  printf '%s\n' "$output" | tail -n 1 | grep -qx 'PASSED'
